services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cad-review-pgvector
    environment:
      POSTGRES_DB: cad_review_vector
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgvector_data:
