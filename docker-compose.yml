services:
  cad-parser:
    build:
      context: ../cad-drawing-parser
      dockerfile: Dockerfile
    image: cad-review/cad-parser:latest
    container_name: cad-review-parser
    ports:
      - "8765:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
