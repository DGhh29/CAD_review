server:
  port: 8090

spring:
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  ai:
    chat:
      client:
        enabled: false
    openai:
      api-key: ${OPENAI_API_KEY:sk-placeholder}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: gpt-4o
          temperature: 0.2
          max-tokens: 2048
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:sk-ant-placeholder}
      chat:
        options:
          model: claude-sonnet-4-6
          temperature: 0.2
          max-tokens: 2048

cad-review:
  llm:
    default-provider: OPENAI
    timeout-ms: 30000
    retry:
      max-attempts: 1
      backoff-ms: 1000
  skills:
    paths: classpath:skills/cad-fire-zone-review/
  parser:
    python-path: python
    script-path: D:/workspace/oDev/cad-drawing-parser/parse_cad.py
    timeout-seconds: 120
    max-entities: 10000
    max-texts: 2000
    dwg-converter: ""
    direct-dwg-enabled: false
